<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INSTRUMENTAL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1 class="logo" style="cursor:pointer" onclick="location.reload()">INSTRUMENTAL</h1>
  </header>
  <main>
    <section id="demoSection" class="demo-section">
      <div class="section-label">Cherrypicks</div>
      <div class="section-hint">Pre-matched with clean source audio</div>
      <div class="demo-grid">
        <div class="demo-card" data-demo="gunnr">
          <div class="demo-title">GUNNR</div>
          <div class="demo-subtitle">Said and Done</div>
        </div>
        <div class="demo-card" data-demo="poster_boy">
          <div class="demo-title">2HOLLIS</div>
          <div class="demo-subtitle">Poster Boy</div>
        </div>
        <div class="demo-card" data-demo="lie">
          <div class="demo-title">2HOLLIS</div>
          <div class="demo-subtitle">Lie</div>
        </div>
      </div>
    </section>

    <div id="dividerOr" class="divider-or">or</div>

    <section id="wildSection" class="wild-section">
      <div class="section-label">Wild ground</div>
      <div class="section-hint">Try your favourite song. Results vary depending on audio quality</div>
      <div class="wild-options">
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search for a song...">
          <button id="searchBtn" class="search-btn">Search</button>
        </div>
        <div id="searchResults" class="search-results hidden"></div>
      </div>
    </section>

    <section id="dropZone" class="drop-zone">
      <div class="drop-content">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 34V14M24 14L16 22M24 14L32 22" stroke="#000000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <p class="drop-text">Drop your synth sample</p>
        <p class="drop-hint">Clean synth recording, MP3 or WAV</p>
      </div>
      <input type="file" id="fileInput" accept=".mp3,.wav,.m4a" hidden>
      <div id="fileInfo" class="file-info hidden">
        <span id="fileName"></span>
        <button id="clearFile" class="clear-btn">x</button>
      </div>
      <button id="matchBtn" class="match-btn" disabled>Match</button>
    </section>

    <section id="playerSection" class="player-section hidden">
      <div class="player">
        <button id="playerPlayBtn" class="player-play-btn">Play</button>
        <div id="playerProgressBar" class="player-progress">
          <div id="playerProgressFill" class="player-progress-fill"></div>
        </div>
        <span id="playerTime" class="player-time">0:00 / 0:00</span>
      </div>
    </section>

    <section id="stemSection" class="stem-section hidden">
      <div id="stemContainer" class="stem-container"></div>
    </section>

    <section id="progressSection" class="progress-section hidden">
      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>
      <div class="progress-stats">
        <span id="progressPhase" class="progress-phase"></span>
        <span id="evalCount">0 / 10,000</span>
        <span id="currentLoss">Loss: --</span>
        <span id="elapsedTime">0s</span>
      </div>
    </section>

    <section id="resultSection" class="result-section hidden">
      <canvas id="waveformCanvas" class="waveform-canvas"></canvas>
      <div id="keyboardContainer" class="keyboard-container"></div>
    </section>

    <section id="dawSection" class="daw-section hidden">
      <div id="dawContainer" class="daw-container"></div>
      <button id="dawPlayBtn" class="daw-play-btn">Play Sequence</button>
    </section>
  </main>

  <script src="synth.js?v=22"></script>
  <script src="waveform.js?v=22"></script>
  <script src="keyboard.js?v=22"></script>
  <script src="daw.js?v=22"></script>
  <script src="player.js?v=22"></script>
  <script src="stems.js?v=22"></script>
  <script src="app.js?v=22"></script>
</body>
</html>
